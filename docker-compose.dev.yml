services:
  frontend:
    build:
      context: ./frontend
      target: deps
    command: npm run dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3001:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  frontend_node_modules:
  frontend_next_cache:
